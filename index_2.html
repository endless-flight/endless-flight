<!DOCTYPE html>
<html lang="ja" style="color-scheme: light;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エンドレスフライト｜AI・Python学習と推し活の記録</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Nunito:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-primary: #FFB6D9;
            --color-text: #2D3436;
            --color-bg: #FFFBF5;
            --font-heading: 'Poppins', 'Noto Sans JP', sans-serif;
            --font-body: 'Nunito', 'Noto Sans JP', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); line-height: 1.8; color: var(--color-text); background-color: var(--color-bg); }

        /* ナビゲーション */
        nav { background: linear-gradient(135deg, #FFE5F0 0%, #E5F4FF 100%); padding: 20px; border-bottom: 2px solid var(--color-primary); }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-family: var(--font-heading); font-size: 1.5rem; font-weight: 900; color: #FF1493; text-decoration: none; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--color-text); text-decoration: none; font-weight: 600; }

        /* FV修正版 */
        .logo-section { min-height: 80vh; display: flex; align-items: center; padding: 40px 80px; background: #FFFBF5; }
        .fv-left { flex: 1; padding-right: 40px; }
        .fv-headline { font-family: var(--font-heading); font-size: 4rem; font-weight: 900; line-height: 1.1; margin-bottom: 24px; }
        .fv-sub { font-size: 1.1rem; color: #636E72; margin-bottom: 40px; }
        
        /* 右側ビジュアルエリア */
        .fv-right { flex: 0 0 460px; display: flex; justify-content: center; align-items: center; }
        
        /* カードの配置イメージ */
        
        
        .fv-card-stack { position: relative; width: 380px; height: 480px; }
        .fv-app-card { position: absolute; background: white; border-radius: 28px; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); width: 200px; }
        .fv-app-card-1 { top: 50px; left: 80px; transform: rotate(-4deg); }
        .fv-app-card-2 { bottom: 50px; left: 20px; transform: rotate(5deg); }

        @media (max-width: 900px) {
            .logo-section { flex-direction: column; text-align: center; }
            .fv-left { padding-right: 0; }
            .fv-right { margin-top: 40px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Endless Flight</a>
            <div class="nav-links">
                <a href="index.html">Top</a>
                <a href="column/">コラム</a>
                <a href="lp/">アプリ</a>
                <a href="https://note.com/endless_flight" target="_blank">Note</a>
            </div>
        </div>
    </nav>

    <section class="logo-section">
        <div class="fv-left">
            <h1 class="fv-headline">触って、作って、<br><span style="color: #FF1493;">飛び続ける</span></h1>
            <p class="fv-sub">「とりあえず触ってみよう」でAI・Python学習を始めました。<br>日常のちょっとした作業を楽にする試行錯誤の記録です。</p>
        </div>
        <div class="fv-right">
            <div class="fv-card-stack">
                <div class="fv-app-card fv-app-card-1">チケットポケット</div>
                <div class="fv-app-card fv-app-card-2">AI x 個人開発</div>
            </div>
        </div>
    </section>

</body>
</html>
