<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B4A9E"/>
      <stop offset="35%" stop-color="#9B7EDE"/>
      <stop offset="70%" stop-color="#E090C8"/>
      <stop offset="100%" stop-color="#FFCB77"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFEAFB"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD66B"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <linearGradient id="appHeaderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B5BC9"/>
      <stop offset="100%" stop-color="#9B7EDE"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <symbol id="mic" viewBox="-30 -40 60 90">
      <rect x="-15" y="-30" width="30" height="46" rx="15" fill="white"/>
      <rect x="-11" y="-26" width="22" height="38" rx="11" fill="#9B7EDE"/>
      <line x1="-8" y1="-18" x2="8" y2="-18" stroke="white" stroke-width="1.5" opacity="0.5"/>
      <line x1="-8" y1="-10" x2="8" y2="-10" stroke="white" stroke-width="1.5" opacity="0.5"/>
      <line x1="-8" y1="-2" x2="8" y2="-2" stroke="white" stroke-width="1.5" opacity="0.5"/>
      <line x1="-8" y1="6" x2="8" y2="6" stroke="white" stroke-width="1.5" opacity="0.5"/>
      <path d="M -22 10 Q -22 28 0 28 Q 22 28 22 10" stroke="white" stroke-width="4" fill="none"/>
      <rect x="-3" y="26" width="6" height="18" fill="white"/>
      <rect x="-16" y="42" width="32" height="6" rx="3" fill="white"/>
    </symbol>

    <symbol id="sparkle" viewBox="-20 -20 40 40">
      <path d="M 0 -18 L 4 -4 L 18 0 L 4 4 L 0 18 L -4 4 L -18 0 L -4 -4 Z" fill="white"/>
    </symbol>

    <symbol id="note" viewBox="-30 -40 60 80">
      <g fill="#FFD66B">
        <ellipse cx="-2" cy="20" rx="14" ry="10" transform="rotate(-25, -2, 20)"/>
        <rect x="9" y="-28" width="4" height="50" rx="1"/>
        <path d="M 11 -28 Q 32 -22 25 -2 Q 20 -14 11 -8 Z"/>
      </g>
    </symbol>

    <symbol id="train" viewBox="-22 -16 44 32">
      <rect x="-20" y="-12" width="40" height="20" rx="10" fill="white"/>
      <rect x="-18" y="-10" width="14" height="10" rx="3" fill="#9B7EDE"/>
      <rect x="-2" y="-10" width="20" height="10" rx="2" fill="#9B7EDE" opacity="0.8"/>
      <circle cx="-12" cy="10" r="3" fill="white"/>
      <circle cx="12" cy="10" r="3" fill="white"/>
    </symbol>

    <symbol id="coin" viewBox="-20 -20 40 40">
      <circle cx="0" cy="0" r="18" fill="#FFD66B"/>
      <circle cx="0" cy="0" r="15" fill="none" stroke="#E89B1F" stroke-width="1.5"/>
      <text x="0" y="6" font-family="Noto Sans CJK JP, sans-serif" font-size="20" font-weight="800" fill="#7A4A0A" text-anchor="middle">¥</text>
    </symbol>

    <symbol id="chart" viewBox="-20 -20 40 40">
      <rect x="-16" y="-16" width="32" height="32" rx="4" fill="white"/>
      <rect x="-11" y="-2" width="5" height="11" rx="1" fill="#9B7EDE"/>
      <rect x="-3" y="-9" width="5" height="18" rx="1" fill="#7B5BC9"/>
      <rect x="5" y="-13" width="5" height="22" rx="1" fill="#5B4A9E"/>
    </symbol>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <circle cx="200" cy="120" r="180" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="1050" cy="500" r="220" fill="#FFFFFF" opacity="0.06"/>
  <circle cx="950" cy="100" r="80" fill="#FFCB77" opacity="0.25"/>

  <g opacity="0.15">
    <line x1="0" y1="0" x2="400" y2="300" stroke="white" stroke-width="2"/>
    <line x1="0" y1="80" x2="380" y2="300" stroke="white" stroke-width="1.5"/>
    <line x1="80" y1="0" x2="400" y2="280" stroke="white" stroke-width="1.5"/>
  </g>

  <g opacity="0.9">
    <use href="#sparkle" x="95" y="65" width="32" height="32"/>
    <use href="#sparkle" x="1065" y="185" width="28" height="28"/>
    <use href="#sparkle" x="1110" y="445" width="20" height="20"/>
    <use href="#sparkle" x="65" y="465" width="28" height="28"/>
    <use href="#sparkle" x="555" y="42" width="16" height="16"/>
  </g>

  <g fill="white" opacity="0.7">
    <circle cx="300" cy="50" r="2.5"/>
    <circle cx="450" cy="100" r="1.8"/>
    <circle cx="900" cy="40" r="2"/>
    <circle cx="180" cy="300" r="2.2"/>
    <circle cx="1050" cy="320" r="1.8"/>
    <circle cx="500" cy="580" r="2"/>
    <circle cx="40" cy="200" r="1.5"/>
    <circle cx="700" cy="600" r="2"/>
  </g>

  <g transform="translate(150, 400) rotate(-15)" filter="url(#softShadow)" opacity="0.9">
    <use href="#note" x="-30" y="-40" width="60" height="80"/>
  </g>
  <g transform="translate(1050, 360) rotate(20)" filter="url(#softShadow)" opacity="0.85">
    <use href="#note" x="-25" y="-32" width="50" height="64"/>
  </g>

  <g transform="translate(600, 90)" filter="url(#softShadow)">
    <rect x="-180" y="-28" width="360" height="56" rx="28" fill="url(#badgeGrad)"/>
    <use href="#sparkle" x="-160" y="-12" width="24" height="24"/>
    <text x="0" y="9" font-family="Noto Sans CJK JP, sans-serif" font-size="24" font-weight="800" fill="#5B3A0E" text-anchor="middle">AIが遠征プランを自動生成</text>
    <use href="#sparkle" x="136" y="-12" width="24" height="24"/>
  </g>

  <g transform="translate(600, 220)">
    <text x="0" y="0" font-family="Noto Sans CJK JP, sans-serif" font-size="34" font-weight="700" fill="#FFEAFB" text-anchor="middle" letter-spacing="6">
      乃木坂46 真夏の全国ツアー
    </text>
  </g>

  <g transform="translate(120, 290)" filter="url(#strongShadow)">
    <use href="#mic" x="-30" y="-40" width="60" height="90"/>
  </g>
  <g transform="translate(1080, 290) scale(-1, 1)" filter="url(#strongShadow)">
    <use href="#mic" x="-30" y="-40" width="60" height="90"/>
  </g>

  <g transform="translate(600, 330)">
    <text x="0" y="0" font-family="Noto Sans CJK JP, sans-serif" font-size="110" font-weight="900" fill="url(#titleGrad)" text-anchor="middle" filter="url(#strongShadow)" letter-spacing="4">
      遠征プランナー
    </text>
  </g>

  <g transform="translate(870, 380)" filter="url(#strongShadow)">
    <rect x="0" y="0" width="290" height="200" rx="14" fill="white"/>
    <rect x="0" y="0" width="290" height="36" rx="14" fill="url(#appHeaderGrad)"/>
    <rect x="0" y="22" width="290" height="14" fill="url(#appHeaderGrad)"/>
    <use href="#mic" x="6" y="2" width="20" height="32"/>
    <text x="33" y="23" font-family="Noto Sans CJK JP, sans-serif" font-size="12" font-weight="700" fill="white">遠征プランナー</text>
    <circle cx="262" cy="18" r="4" fill="rgba(255,255,255,0.5)"/>
    <circle cx="275" cy="18" r="4" fill="rgba(255,255,255,0.5)"/>

    <text x="14" y="58" font-family="Noto Sans CJK JP, sans-serif" font-size="9" font-weight="700" fill="#4A3E5C">ツアー情報のURL</text>
    <rect x="14" y="62" width="262" height="18" rx="4" fill="#F3EFFB" stroke="#E8E0F5"/>
    <text x="20" y="75" font-family="Noto Sans CJK JP, sans-serif" font-size="9" fill="#7B5BC9">https://www.nogizaka46.com/...</text>

    <text x="14" y="94" font-family="Noto Sans CJK JP, sans-serif" font-size="9" font-weight="700" fill="#4A3E5C">出発駅</text>
    <rect x="14" y="98" width="125" height="18" rx="4" fill="#F3EFFB" stroke="#E8E0F5"/>
    <text x="20" y="111" font-family="Noto Sans CJK JP, sans-serif" font-size="9" fill="#7B5BC9">東京駅</text>

    <text x="151" y="94" font-family="Noto Sans CJK JP, sans-serif" font-size="9" font-weight="700" fill="#4A3E5C">予算</text>
    <rect x="151" y="98" width="125" height="18" rx="4" fill="#F3EFFB" stroke="#E8E0F5"/>
    <text x="157" y="111" font-family="Noto Sans CJK JP, sans-serif" font-size="9" fill="#7B5BC9">46万円</text>

    <rect x="14" y="127" width="262" height="26" rx="13" fill="#9B7EDE"/>
    <use href="#sparkle" x="30" y="133" width="14" height="14"/>
    <text x="155" y="144" font-family="Noto Sans CJK JP, sans-serif" font-size="11" font-weight="800" fill="white" text-anchor="middle">AIに遠征プランを生成させる</text>

    <rect x="14" y="162" width="262" height="28" rx="4" fill="#FFF8E1"/>
    <text x="22" y="174" font-family="Noto Sans CJK JP, sans-serif" font-size="8" font-weight="700" fill="#4A3E5C">福井 / 北海道 / 広島 / 大阪 …</text>
    <text x="22" y="185" font-family="Noto Sans CJK JP, sans-serif" font-size="9" font-weight="800" fill="#7B5BC9">合計 ¥555,000</text>
    <text x="265" y="185" font-family="Noto Sans CJK JP, sans-serif" font-size="8" fill="#4A3E5C" text-anchor="end">9公演</text>
  </g>

  <g transform="translate(40, 430)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="240" height="46" rx="23" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
      <use href="#train" x="14" y="11" width="32" height="24"/>
      <text x="58" y="22" font-family="Noto Sans CJK JP, sans-serif" font-size="13" font-weight="700" fill="white">新幹線・宿泊</text>
      <text x="58" y="38" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">最適化ルートを提案</text>
    </g>
    <g transform="translate(0, 56)">
      <rect x="0" y="0" width="240" height="46" rx="23" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
      <use href="#coin" x="14" y="7" width="32" height="32"/>
      <text x="58" y="22" font-family="Noto Sans CJK JP, sans-serif" font-size="13" font-weight="700" fill="white">予算管理</text>
      <text x="58" y="38" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">合計を自動計算</text>
    </g>
    <g transform="translate(0, 112)">
      <rect x="0" y="0" width="240" height="46" rx="23" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
      <use href="#chart" x="14" y="7" width="32" height="32"/>
      <text x="58" y="22" font-family="Noto Sans CJK JP, sans-serif" font-size="13" font-weight="700" fill="white">Excel出力</text>
      <text x="58" y="38" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">プラン保存も対応</text>
    </g>
  </g>

  <text x="1160" y="608" font-family="Noto Sans CJK JP, sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.92)" text-anchor="end">
    endless-flight.github.io
  </text>

  <text x="40" y="608" font-family="Noto Sans CJK JP, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)">
    by Endless Flight
  </text>
</svg>
